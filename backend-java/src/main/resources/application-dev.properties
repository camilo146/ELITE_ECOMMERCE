# ── DEV PROFILE — never commit real secrets ───────────────────────────────────
# Activate: SPRING_PROFILES_ACTIVE=dev  (or add to IDE run config)

spring.datasource.url=jdbc:sqlite:fixes.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# 512-bit dev-only JWT secret
jwt.secret=ZGV2T25seVNlY3JldEtleUZvckxvY2FsRGV2ZWxvcG1lbnRPbmx5Tm90Rm9yUHJvZHVjdGlvbjEyMzQ1Njc=
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Credenciales del admin de prueba (solo perfil dev)
seed.admin.email=admin@elite.com
seed.admin.password=admin123

# Skip email verification in dev — set true to test the full flow
app.email-verification.required=false

# Redis not required in dev — falls back to in-memory implementations
# Uncomment to test with local Redis:
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# Email — Resend (pon tu API key de Resend aquí o en el .env)
# Obtén tu key gratis en: https://resend.com/api-keys
# Mientras no tengas key, los emails fallan silenciosamente (no rompen la app)
spring.mail.host=smtp.resend.com
spring.mail.port=465
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY:RE_placeholder_key}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
# Para pruebas sin dominio propio, usa onboarding@resend.dev como remitente
app.mail.from=${MAIL_FROM:onboarding@resend.dev}
app.mail.from-name=ELITE Dev

# Dev MP credentials
mp.access.token=${MP_ACCESS_TOKEN:SET_YOUR_MP_TEST_TOKEN}
mp.webhook.secret=${MP_WEBHOOK_SECRET:dev-webhook-secret}

app.frontend.url=http://localhost:5173
app.backend.url=http://localhost:8080
