# ── PRODUCTION PROFILE ────────────────────────────────────────────────────────
# Activate: SPRING_PROFILES_ACTIVE=prod
# All sensitive values MUST come from environment variables or a secrets manager.

# ── Flyway — enabled for PostgreSQL migrations ───────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# ── Database (PostgreSQL) ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# NEVER update or create in production — use Flyway or Liquibase
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── Redis (required in production) ───────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# ── Email verification required in production ────────────────────────────────
app.email-verification.required=true
app.email-verification.token-hours=24

# ── Server hardening ─────────────────────────────────────────────────────────
server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never
# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
# HTTP/2
server.http2.enabled=true
# Force HTTPS if not behind load balancer
# server.ssl.enabled=true

# ── Actuator — mismo puerto que la app (8080), solo /health es público ────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ── Sentry error tracking ────────────────────────────────────────────────────
sentry.dsn=${SENTRY_DSN}
sentry.environment=production
sentry.traces-sample-rate=0.1
sentry.send-default-pii=false
# Capture exceptions of severity ERROR and above
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=warn
