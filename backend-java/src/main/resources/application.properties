spring.application.name=elite-ecommerce
server.port=8080

# Flyway — disabled by default (SQLite dev); enabled in prod profile
spring.flyway.enabled=false

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:sqlite:fixes.db}
spring.datasource.driver-class-name=${DB_DRIVER:org.sqlite.JDBC}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.community.dialect.SQLiteDialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# NO fallback — fails fast on startup if missing
# Generate: openssl rand -base64 64
jwt.secret=${JWT_SECRET}
# Access token: 15 minutes
jwt.expiration=900000
# Refresh token: 7 days
jwt.refresh-expiration=604800000

# ── Redis ─────────────────────────────────────────────────────────────────────
# When REDIS_HOST is not set, the app falls back to in-memory implementations.
# Set in production for distributed deployments.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=1000ms

# ── Email — Resend SMTP ───────────────────────────────────────────────────────
# Puerto 587 (STARTTLS) — DigitalOcean bloquea el 465 (SSL directo)
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Dirección "De:" — usa onboarding@resend.dev para pruebas,
# o tu dominio verificado en producción: noreply@tudominio.com
app.mail.from=${MAIL_FROM:onboarding@resend.dev}
app.mail.from-name=${MAIL_FROM_NAME:ELITE}

# ── Mercado Pago ──────────────────────────────────────────────────────────────
mp.access.token=${MP_ACCESS_TOKEN}
mp.webhook.secret=${MP_WEBHOOK_SECRET}

# ── App ───────────────────────────────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}
# Email verification: set false in dev to skip email confirmation
app.email-verification.required=${EMAIL_VERIFICATION_REQUIRED:true}
# Verification token TTL in hours
app.email-verification.token-hours=24

# ── File Upload — 50 MB para fotos de alta calidad ───────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
# El health check de mail hace timeout en SMTP y bloquea Docker — deshabilitado
management.health.mail.enabled=false

# ── H2 — always off ──────────────────────────────────────────────────────────
spring.h2.console.enabled=false
