## ──────────────────────────────────────────────────────────────────────────────
##  ELITE — Extensión HTTPS para desarrollo local
##
##  Uso (después de ejecutar scripts/ssl-dev.sh):
##    docker compose -f docker-compose.yml -f docker-compose.https.yml up --build
##
##  Esto agrega puerto 443 al contenedor frontend y usa la config Nginx con SSL.
##  Los certificados son autofirmados → el navegador mostrará advertencia.
## ──────────────────────────────────────────────────────────────────────────────

services:
  frontend:
    ports:
      - "443:443"
    volumes:
      # Sobreescribe nginx.dev.conf con la config que tiene SSL
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl/certs:/etc/nginx/ssl:ro
      - ./ssl/dhparam.pem:/etc/nginx/dhparam.pem:ro

  backend:
    environment:
      # Con HTTPS, la URL del frontend cambia
      - FRONTEND_URL=https://localhost
