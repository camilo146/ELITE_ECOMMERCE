## ──────────────────────────────────────────────────────────────────────────────
##  ELITE — Docker Compose PRODUCCIÓN
##  Uso: docker compose -f docker-compose.prod.yml up --build -d
##
##  Requisitos antes de lanzar:
##    1. Copia .env.example → .env y rellena TODOS los valores
##    2. Genera certificados SSL: ver README o usa Certbot
##    3. Genera DH params: openssl dhparam -out ssl/dhparam.pem 4096
##    4. Lee DEPLOY_CHECKLIST al final de este archivo
## ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: elite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: elite-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 192M

  # ── Backend (Spring Boot) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: elite-backend
    restart: unless-stopped

    environment:
      - SPRING_PROFILES_ACTIVE=prod

      # Base de datos PostgreSQL
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # Seguridad
      - JWT_SECRET=${JWT_SECRET}
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET}

      # URLs
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}

      # Email
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}

      # Observabilidad
      - SENTRY_DSN=${SENTRY_DSN}
      - EMAIL_VERIFICATION_REQUIRED=true

    volumes:
      - backend_uploads:/app/uploads
    networks:
      - backend-net
      - frontend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '0.80'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  # ── Frontend (React + Nginx con HTTPS) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: elite-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Config Nginx con HTTPS (sobreescribe el nginx.dev.conf del Dockerfile)
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Certificados SSL (generados con Certbot)
      - ./ssl/certs:/etc/nginx/ssl:ro
      - ./ssl/dhparam.pem:/etc/nginx/dhparam.pem:ro
    networks:
      - frontend-net
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M

networks:
  backend-net:
    driver: bridge
    internal: true       # PostgreSQL y Redis sin acceso directo a internet
  frontend-net:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:

## ──────────────────────────────────────────────────────────────────────────────
## DEPLOY_CHECKLIST — Antes de cada deploy a producción:
##
##  SECRETOS
##  [ ] JWT_SECRET = $(openssl rand -base64 64)   — mínimo 64 chars base64
##  [ ] MP_ACCESS_TOKEN = token PRODUCCIÓN (no TEST)
##  [ ] MP_WEBHOOK_SECRET = secret del panel de MP
##  [ ] DB_PASSWORD = contraseña fuerte y única
##  [ ] REDIS_PASSWORD = contraseña fuerte y única
##  [ ] MAIL_* configurados y probados
##  [ ] SENTRY_DSN del proyecto en Sentry
##
##  INFRAESTRUCTURA
##  [ ] Certificados SSL montados en ssl/certs/
##  [ ] openssl dhparam -out ssl/dhparam.pem 4096
##  [ ] FRONTEND_URL = https://tudominio.com
##  [ ] BACKEND_URL = https://tudominio.com
##  [ ] Backup cron: 0 2 * * * /path/backup.sh >> /var/log/backup.log
##
##  VERIFICACIÓN POST-DEPLOY
##  [ ] docker compose -f docker-compose.prod.yml ps  (todos healthy)
##  [ ] curl http://tudominio.com → redirige a https://
##  [ ] curl https://tudominio.com/api/actuator/health → {"status":"UP"}
##  [ ] Registrar usuario → email de verificación llega
##  [ ] Crear pedido → precio calculado por servidor (no frontend)
## ──────────────────────────────────────────────────────────────────────────────
