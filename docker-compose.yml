## ──────────────────────────────────────────────────────────────────────────────
##  ELITE — Docker Compose DESARROLLO
##  Uso: docker compose up --build
##
##  Levanta:
##    • Backend  Spring Boot (Java 17, SQLite, perfil "dev")
##    • Frontend React + Nginx (HTTP en puerto 80)
##
##  No requiere PostgreSQL ni Redis — el perfil dev usa SQLite e in-memory.
##  Para producción: docker compose -f docker-compose.prod.yml up --build
## ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend (Spring Boot) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: elite-backend
    restart: unless-stopped

    environment:
      - SPRING_PROFILES_ACTIVE=dev

      # Perfil dev provee jwt.secret internamente → JWT_SECRET no requerido
      # Descomenta si quieres usar tu propio secret:
      # - JWT_SECRET=${JWT_SECRET}

      # MercadoPago — opcionales en dev (usa placeholders si no se ponen)
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-REEMPLAZA_CON_TOKEN_TEST_MP}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:-dev-webhook-secret}

      # URLs — el frontend está en http://localhost (Nginx port 80)
      - FRONTEND_URL=http://localhost
      - BACKEND_URL=http://localhost:8080

      # Email — opcional en dev (email-verification.required=false en perfil dev)
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}

    volumes:
      # Persistir la base de datos SQLite entre reinicios
      - sqlite_data:/app
    ports:
      # Puerto 8080 expuesto para debugear con Postman/Swagger directamente
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend (React + Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # En Docker el frontend llama a /api/... → Nginx hace el proxy al backend
        VITE_API_URL: /api
    container_name: elite-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Usa la config HTTP simple (sin SSL) para desarrollo
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
    driver: local
