# ──────────────────────────────────────────────────────────────────────────────
# ELITE — Production Nginx Configuration
# ──────────────────────────────────────────────────────────────────────────────

# Disable server version header
server_tokens off;

# HTTP → HTTPS redirect (all traffic)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ── TLS certificates ──────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_dhparam         /etc/nginx/dhparam.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://images.unsplash.com data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://www.mercadopago.com; upgrade-insecure-requests" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── Request limits (DoS protection) ──────────────────────────────────────
    client_max_body_size 6M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    # ── Rate limiting zones (declared in nginx.conf http block) ──────────────
    # NOTE: These limit_req_zone directives must be in the http{} block.
    # They are here for documentation; move to /etc/nginx/nginx.conf http section.
    # limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/m;
    # limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;

    root /usr/share/nginx/html;
    index index.html;

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Static assets (hashed filenames — long cache) ─────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    location /api {
        # Rate limiting on auth endpoints
        # limit_req zone=api_login burst=3 nodelay;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Don't expose backend errors directly
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    # ── File uploads ──────────────────────────────────────────────────────────
    location /uploads {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Served as inline content only — never as download
        add_header Content-Disposition "inline";
        add_header X-Content-Type-Options "nosniff";

        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~* \.(env|git|htaccess|sql|bak|backup|sh|conf)$ {
        deny all;
        return 404;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
