# ──────────────────────────────────────────────────────────────────────────────
# ELITE — Nginx producción
#
# REGLA CRÍTICA DE NGINX:
# Si un location{} hijo usa add_header, ELIMINA todos los add_header del
# server{} padre. Por eso NINGÚN location block usa add_header aquí.
# Solo usamos 'expires' para cache — no afecta la herencia de headers.
# ──────────────────────────────────────────────────────────────────────────────

server_tokens off;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_dhparam         /etc/nginx/dhparam.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers — definidos UNA SOLA VEZ aquí en el server block ─────
    # Se heredan automáticamente a todos los location blocks que NO tengan add_header.

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(self https://www.mercadopago.com)" always;
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' https://images.unsplash.com data: blob: https:; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self'; media-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://www.mercadopago.com; upgrade-insecure-requests" always;

    # ── Compresión ────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/javascript image/svg+xml;

    # ── Límites ───────────────────────────────────────────────────────────────
    client_max_body_size   6M;
    client_body_timeout    30s;
    client_header_timeout  30s;
    keepalive_timeout      65s;
    send_timeout           30s;

    root  /usr/share/nginx/html;
    index index.html;

    # ── SPA — React Router ────────────────────────────────────────────────────
    # Sin add_header → hereda security headers del server block
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    # ── Assets estáticos — cache 1 año ────────────────────────────────────────
    # Sin add_header → hereda security headers del server block
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|webp|gif|svg)$ {
        expires 1y;
        access_log off;
    }

    # ── API proxy → Spring Boot ───────────────────────────────────────────────
    # Sin add_header → hereda security headers del server block
    location /api {
        proxy_pass          http://backend:8080;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 4k;
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    # ── Uploads ───────────────────────────────────────────────────────────────
    location /uploads {
        proxy_pass       http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
    }

    # ── Bloquear rutas sensibles ──────────────────────────────────────────────
    location ~* \.(env|git|htaccess|sql|bak|sh|conf)$ {
        deny   all;
        return 404;
    }

    location = /50x.html {
        root     /usr/share/nginx/html;
        internal;
    }
}
