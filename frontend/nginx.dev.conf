server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Seguridad básica ──────────────────────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Compresión ────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # ── SPA — React Router ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # ── Assets estáticos con cache largo ─────────────────────────────────────
    location ~* \.(js|css|woff2?|ico|png|jpg|jpeg|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Proxy al backend ──────────────────────────────────────────────────────
    # El navegador hace requests a /api/... → Nginx los reenvía al backend
    location /api {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        client_max_body_size 6M;
    }

    # ── Uploads ───────────────────────────────────────────────────────────────
    # ^~ gives this prefix priority over the static-asset regex ~* \.(png|jpg)$
    location ^~ /uploads {
        proxy_pass       http://backend:8080;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Bloquear archivos sensibles ───────────────────────────────────────────
    location ~* \.(env|git|sh|sql|conf|bak)$ {
        deny all;
        return 404;
    }
}
