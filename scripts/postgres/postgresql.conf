# ──────────────────────────────────────────────────────────────────────────────
# PostgreSQL production configuration for ELITE (1GB RAM container)
# Tune shared_buffers and work_mem based on actual container memory.
# ──────────────────────────────────────────────────────────────────────────────

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers = 256MB           # 25% of RAM
effective_cache_size = 768MB     # 75% of RAM (hint to planner)
work_mem = 16MB                  # per sort/hash — careful with many connections
maintenance_work_mem = 64MB      # for VACUUM, CREATE INDEX

# ── Connections ───────────────────────────────────────────────────────────────
max_connections = 50             # HikariCP max-pool=20 + overhead
connection_timeout = 30000

# ── WAL / Durability ──────────────────────────────────────────────────────────
wal_level = replica              # required for pg_basebackup
archive_mode = off               # enable for WAL archiving to S3
fsync = on                       # NEVER disable in production
synchronous_commit = on          # NEVER disable for payment data
checkpoint_completion_target = 0.9

# ── Query planner ─────────────────────────────────────────────────────────────
random_page_cost = 1.1           # for SSDs (default 4.0 is for spinning disks)
effective_io_concurrency = 200   # for SSDs

# ── Logging ───────────────────────────────────────────────────────────────────
log_min_duration_statement = 500 # log slow queries > 500ms
log_checkpoints = on
log_connections = off            # too verbose; enable temporarily for debugging
log_disconnections = off
log_lock_waits = on
log_timezone = 'UTC'

# ── Security ──────────────────────────────────────────────────────────────────
ssl = on
ssl_cert_file = 'server.crt'
ssl_key_file = 'server.key'
password_encryption = scram-sha-256

# ── Autovacuum ────────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# ── Timezone ──────────────────────────────────────────────────────────────────
timezone = 'UTC'
log_timezone = 'UTC'
